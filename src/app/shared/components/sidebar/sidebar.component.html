<aside class="sidebar">

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#0d6efd"><path d="M8 5v14l11-7z"/></svg>

    <div class="sidebar__user-avatar"></div>
