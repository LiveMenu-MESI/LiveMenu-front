<div class="logo-upload">
  <div class="logo-upload__preview">
    <span class="logo-upload__icon" [innerHTML]="buildingIcon"></span>
  </div>
  <div class="logo-upload__actions">
    <button type="button" class="logo-upload__button">
      <span class="logo-upload__button-icon" [innerHTML]="uploadIcon"></span>
      Subir Logo
    </button>
    <p class="logo-upload__hint">Formato: JPG, PNG. Tamaño recomendado: 512x512px</p>
  </div>
</div>
