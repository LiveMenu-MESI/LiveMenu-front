<div class="restaurant-menu-header">
  <div class="restaurant-menu-header__info">
    <h1 class="restaurant-menu-header__name">{{ name() }}</h1>
    <a [routerLink]="['/restaurants', restaurantId()]" class="restaurant-menu-header__profile-link">Ver perfil</a>
  </div>
  @if (description()) {
    <p class="restaurant-menu-header__description">{{ description() }}</p>
  } @else {
    <p class="restaurant-menu-header__description">Gestiona las categorías y platillos del menú</p>
  }
</div>
