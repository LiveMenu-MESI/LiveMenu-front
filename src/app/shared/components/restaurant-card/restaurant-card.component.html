<div class="restaurant-card">
  <div class="restaurant-card__icon" [innerHTML]="buildingIcon"></div>
  <h3 class="restaurant-card__name">{{ restaurant().name }}</h3>
  <p class="restaurant-card__subtitle">{{ restaurant().subtitle || '—' }}</p>
  <div class="restaurant-card__actions">
    <button type="button" class="restaurant-card__btn restaurant-card__btn--edit" (click)="edit.emit()">Editar</button>
    <button type="button" class="restaurant-card__btn restaurant-card__btn--delete" (click)="delete.emit()">Eliminar</button>
  </div>
</div>
