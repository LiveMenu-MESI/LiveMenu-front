<app-modal
  title="Mis Restaurantes"
  subtitle="Administra tus restaurantes y menús"
  (closed)="onCancel()"
>
  <form (ngSubmit)="onSubmit()" [formGroup]="form">
    <app-logo-upload [control]="form.get('logo')" />

    <app-form-section title="Información Básica">
      <div class="form-field">
        <label class="form-field__label">Nombre del Restaurante *</label>
        <input type="text" formControlName="name" class="form-field__input" />
        <span class="form-field__hint">Máximo 100 caracteres</span>
        @if (nameControl?.invalid && nameControl?.touched) {
          <span class="form-field__error">Requerido</span>
        }
      </div>
      <div class="form-field">
        <label class="form-field__label">Descripción</label>
        <textarea formControlName="description" class="form-field__input form-field__textarea" rows="3" placeholder="Breve descripción de tu restaurante"></textarea>
        <span class="form-field__hint">Máximo 500 caracteres</span>
      </div>
    </app-form-section>

    <app-form-section title="Información de Contacto">
      <div class="form-field">
        <label class="form-field__label">Teléfono</label>
        <input type="text" formControlName="phone" class="form-field__input" />
      </div>
      <div class="form-field">
        <label class="form-field__label">Dirección</label>
        <input type="text" formControlName="address" class="form-field__input" placeholder="Calle, número, colonia, ciudad" />
      </div>
    </app-form-section>

    <app-form-section title="Horarios de Atención">
      <app-opening-hours-form [scheduleGroup]="scheduleGroup" />
    </app-form-section>

    <div class="form-actions">
      <button type="button" class="form-actions__btn form-actions__btn--secondary" (click)="onCancel()">
        Cancelar
      </button>
      <button type="submit" class="form-actions__btn form-actions__btn--primary">
        Guardar Restaurante
      </button>
    </div>
  </form>
</app-modal>
