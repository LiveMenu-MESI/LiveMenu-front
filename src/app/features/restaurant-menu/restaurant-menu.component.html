<div class="restaurant-menu-page">
  @if (error()) {
    <div class="restaurant-menu-page__error">{{ error() }}</div>
  }

  @if (loading()) {
    <p class="restaurant-menu-page__loading">Cargando...</p>
  } @else if (restaurant()) {
    <div class="restaurant-menu-page__top">
      <app-restaurant-menu-header
        [restaurantId]="restaurant()!.id"
        [name]="restaurant()!.name"
        [description]="restaurant()!.description ?? 'Gestiona las categorías y platillos del menú'"
        (editProfile)="onEditProfile()"
      />
      <div class="restaurant-menu-page__actions">
        <button type="button" class="restaurant-menu-page__btn restaurant-menu-page__btn--secondary" (click)="addCategory()">
          + Nueva Categoría
        </button>
        <button type="button" class="restaurant-menu-page__btn restaurant-menu-page__btn--primary" (click)="addDish()">
          + Nuevo Platillo
        </button>
      </div>
    </div>

    <div class="restaurant-menu-page__categories" cdkDropList (cdkDropListDropped)="onCategoryDrop($event)">
      @for (category of categories(); track category.id) {
        <div cdkDrag class="restaurant-menu-page__category-item">
          <app-category-card
            [category]="category"
            [dishCount]="getDishCount(category.id)"
            [dishes]="getDishes(category.id)"
            (edit)="onEditCategory(category)"
            (delete)="onDeleteCategory(category)"
            (editDish)="onEditDish($event)"
          />
          <div class="restaurant-menu-page__drag-handle" cdkDragHandle>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="12" r="1"/>
              <circle cx="9" cy="5" r="1"/>
              <circle cx="9" cy="19" r="1"/>
              <circle cx="15" cy="12" r="1"/>
              <circle cx="15" cy="5" r="1"/>
              <circle cx="15" cy="19" r="1"/>
            </svg>
          </div>
        </div>
      }
    </div>

    @if (showCategoryModal()) {
      <app-category-form-modal
        [category]="editingCategory()"
        (saved)="onCategoryModalSaved($event)"
        (cancelled)="onCategoryModalCancelled()"
      />
    }

    @if (showDishModal() && restaurantId()) {
      <app-dish-form-modal
        [categories]="categories()"
        [restaurantId]="restaurantId()!"
        [dish]="editingDish()"
        (saved)="onDishModalSaved($event)"
        (cancelled)="onDishModalCancelled()"
      />
    }

    @if (showRestaurantModal() && restaurant()) {
      <app-restaurant-form-modal
        [restaurant]="restaurant()"
        (saved)="onRestaurantModalSaved($event)"
        (cancelled)="onRestaurantModalCancelled()"
      />
    }
  }
</div>
