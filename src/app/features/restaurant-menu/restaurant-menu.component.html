<div class="restaurant-menu-page">
  @if (error()) {
    <div class="restaurant-menu-page__error">{{ error() }}</div>
  }

  @if (loading()) {
    <p class="restaurant-menu-page__loading">Cargando...</p>
  } @else if (restaurant()) {
    <div class="restaurant-menu-page__top">
      <app-restaurant-menu-header
        [restaurantId]="restaurant()!.id"
        [name]="restaurant()!.name"
        [description]="restaurant()!.description ?? 'Gestiona las categorías y platillos del menú'"
      />
      <div class="restaurant-menu-page__actions">
        <button type="button" class="restaurant-menu-page__btn restaurant-menu-page__btn--secondary" (click)="addCategory()">
          + Nueva Categoría
        </button>
        <button type="button" class="restaurant-menu-page__btn restaurant-menu-page__btn--primary" (click)="addDish()">
          + Nuevo Platillo
        </button>
      </div>
    </div>

    <div class="restaurant-menu-page__categories">
      @for (category of categories(); track category.id) {
        <app-category-card
          [category]="category"
          [dishCount]="getDishCount(category.id)"
          (edit)="onEditCategory(category)"
          (delete)="onDeleteCategory(category)"
        />
      }
    </div>

    @if (showCategoryModal()) {
      <app-category-form-modal
        [category]="editingCategory()"
        (saved)="onCategoryModalSaved($event)"
        (cancelled)="onCategoryModalCancelled()"
      />
    }
  }
</div>
