# Despliegue: https://livemenu.naing.co con certs en /etc/letsencrypt/live/livemenu.naing.co/
# Uso: docker compose up --build -d
# Puertos 4200 y 4443 en el host (80 y 443 suelen estar ocupados por nginx/caddy).
# Configura tu proxy inverso para reenviar livemenu.naing.co a http://localhost:4200 o https://localhost:4443.
services:
  frontend:
    build:
      context: .
      args:
        API_URL: ${API_URL:-https://api.naing.co}
        FRONTEND_URL: ${FRONTEND_URL:-https://livemenu.naing.co}
    ports:
      - "4200:80"
      - "4443:443"
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt/live/livemenu.naing.co/fullchain.pem:/etc/nginx/ssl/cert.pem:ro
      - /etc/letsencrypt/live/livemenu.naing.co/privkey.pem:/etc/nginx/ssl/key.pem:ro

