services:
  frontend:
    build:
      context: .
      args:
        # Variable de entorno para la URL del API en tiempo de build
        API_URL: ${API_URL:-http://localhost:8080}
    ports:
      - "4200:80"
    # Para construir con otra URL de API: API_URL=http://backend:8080 docker compose up --build

  # Ejemplo de backend (descomentar y crear Dockerfile en backend si aplica):
  # backend:
  #   image: node:20-alpine
  #   working_dir: /app
  #   volumes:
  #     - ../backend:/app
  #   command: npm run start
  #   ports:
  #     - "3000:3000"
