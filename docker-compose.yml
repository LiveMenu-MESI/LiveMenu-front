# Despliegue: frontend en https://livemenu.naing.co, API en https://api.naing.co
# Uso: docker compose up --build -d
# Con proxy inverso (HTTPS): exponer puerto 80 y dejar que nginx/caddy hagan TLS.
services:
  frontend:
    build:
      context: .
      args:
        API_URL: ${API_URL:-https://api.naing.co}
        FRONTEND_URL: ${FRONTEND_URL:-https://livemenu.naing.co}
    ports:
      - "80:80"
    restart: unless-stopped
    # Para otra API en build: API_URL=https://otra-api.ejemplo.com docker compose up --build

  # Ejemplo de backend (descomentar y crear Dockerfile en backend si aplica):
  # backend:
